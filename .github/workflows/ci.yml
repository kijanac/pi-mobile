name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    name: Typecheck + build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: 10.5.2

      - uses: actions/setup-node@v6
        with:
          node-version: 26.3.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # `check` = typecheck (builds protocol + host, typechecks cli) + the mobile
      # vite build + svelte-check. One command covers every package.
      - name: Typecheck + build
        run: pnpm check

      - name: Unit tests
        run: pnpm test

      # Boots a host (mock pi, temp DB) and exercises the real RPC end to end.
      - name: Host smoke test
        run: pnpm smoke:host
